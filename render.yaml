services:
  - type: web
    name: bookbounty-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: uv run gunicorn core.wsgi # Use uv run here as well
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookbounty-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "bookbounty-api.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://bookbounty-ui.onrender.com"
      - key: OPEN_LIBRARY_CONTACT
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # --- Frontend: Static Site ---
  - type: web
    name: bookbounty-ui
    runtime: static
    # plan: free  <-- REMOVED: Static sites are free by default and do not accept a plan field
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist # Explicitly for runtime: static
    envVars:
      - key: VITE_API_BASE_URL
        value: https://bookbounty-api.onrender.com/api

# --- Managed PostgreSQL Database ---
databases:
  - name: bookbounty-db
    plan: free
