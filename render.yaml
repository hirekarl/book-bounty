services:
  # --- Backend: Django Web Service ---
  - type: web
    name: bookbounty-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: uv run gunicorn core.wsgi
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookbounty-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DEMO_MODE
        value: "True"
      - key: ALLOWED_HOSTS
        value: "bookbounty-api.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://bookbounty-ui.onrender.com"

      # --- External API Keys (Manual Setup in Dashboard) ---
      - key: OPEN_LIBRARY_CONTACT
        sync: false #
      - key: GEMINI_API_KEY
        sync: false #

      # --- Django Superuser Automation ---
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@example.com
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true #

  # --- Frontend: Vite Static Site ---
  - type: web #
    name: bookbounty-ui
    runtime: static #
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist #
    envVars:
      - key: VITE_API_BASE_URL
        value: https://bookbounty-api.onrender.com/api

# --- Managed PostgreSQL Database ---
databases:
  - name: bookbounty-db
    plan: free
