services:
  # --- Backend: Django Web Service ---
  - type: web
    name: bookbounty-api
    runtime: python
    plan: free
    rootDir: backend #
    buildCommand: ./build.sh
    startCommand: gunicorn core.wsgi #
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bookbounty-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12" #
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "bookbounty-api.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://bookbounty-ui.onrender.com"
      # Application Specific Config
      - key: OPEN_LIBRARY_CONTACT
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # --- Frontend: Static Site ---
  - type: static
    name: bookbounty-ui
    plan: free
    rootDir: frontend #
    buildCommand: npm install && npm run build #
    staticPublishDir: dist #
    envVars:
      - key: VITE_API_BASE_URL
        value: https://bookbounty-api.onrender.com/api #

# --- Managed PostgreSQL Database ---
databases:
  - name: bookbounty-db
    plan: free